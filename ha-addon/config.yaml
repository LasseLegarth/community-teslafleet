# Home Assistant add-on manifest. Bundled image runs the WHOLE stack in one
# container — fleet-telemetry + the vehicle-command proxy + the gateway — supervised
# by the gateway (TGW_STREAM_EMBEDDED=true is baked into the image). The gateway
# reads HA's /data/options.json directly. MQTT broker is auto-detected from the
# Supervisor (services: mqtt:want + hassio_api). The onboarding wizard is served via
# ingress (HA sidebar). Config is done in HA's native add-on options form below.
#
# NOTE: `version` is overwritten by the release workflow to match the published image tag.
name: Community TeslaFleet
version: "0.1.8"
slug: community_teslafleet
description: Self-hosted Tesla Fleet Telemetry → Home Assistant (+ optional TeslaMate Fleet API)
url: https://github.com/LasseLegarth/community-teslafleet
image: ghcr.io/lasselegarth/community-teslafleet-addon   # bundled multi-arch image (full stack)
arch:
  - aarch64
  - amd64
init: false
hassio_api: true            # required to read the MQTT service from the Supervisor
services:
  - mqtt:want               # auto-use HA's MQTT broker if present (don't block if absent)
panel_icon: mdi:car-electric
ingress: true               # serve the onboarding wizard in the HA sidebar
ingress_port: 8099
ports:
  "4443/tcp": 4443          # fleet-telemetry mTLS — the car dials in (must be reachable from the internet)
  "8098/tcp": 8098          # serves the partner public key at /.well-known/... (route your domain here)
  "4460/tcp": null          # Fleet API + WSS for TeslaMate (LAN-only; set a port only if using TeslaMate)
ports_description:
  "4443/tcp": fleet-telemetry — the car connects here (port-forward this, or use a Cloudflare Tunnel)
  "8098/tcp": Partner public key (.well-known) — route https://<your-domain>/.well-known/... here
  "4460/tcp": Fleet API + WSS for TeslaMate (LAN-only; leave unset if not using TeslaMate)
# State (keys, config, ftc.json, certs) lives in the add-on's own persistent /data
# volume — automatically writable and included in HA backups; no map entry needed.
options:
  namespace: "tesla_telemetry"
  units_system: metric
  device_identifier: name
  telemetry_port: 4443
  telemetry_profile: balanced
  fleetapi_enabled: false
  vins: ""
  commands_enabled: false
  log_level: info
schema:
  namespace: str
  units_system: list(metric|imperial)
  device_identifier: list(name|vin)
  telemetry_port: int(1,65535)
  telemetry_profile: list(eco|balanced|live|custom)
  fleetapi_enabled: bool
  vins: str
  commands_enabled: bool
  log_level: list(debug|info|warn|error)
